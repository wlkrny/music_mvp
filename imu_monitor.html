<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32-S3 IMU Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root { --bg: #0a0a0f; --panel: #12121a; --border: #1e1e30; --text: #c8c8d4; --accent: #00d4aa; --warn: #ff6b6b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  header { background:var(--panel); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  header h1 { font-size:16px; font-weight:600; letter-spacing:0.5px; }
  header h1 span { color:var(--accent); }
  .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:8px; }
  .status-dot.on { background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 2s infinite; }
  .status-dot.off { background:var(--warn); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #connectBtn { background:var(--accent); color:#000; border:none; padding:8px 20px; border-radius:6px; cursor:pointer; font-weight:600; font-size:13px; font-family:inherit; transition:all 0.2s; }
  #connectBtn:hover { opacity:0.85; }
  #connectBtn.connected { background:var(--warn); }

  /* ── Tabs ── */
  .tabs { display:flex; background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0; }
  .tab-btn { padding:10px 24px; background:none; border:none; color:#555; font-size:13px; font-family:inherit; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; letter-spacing:0.5px; }
  .tab-btn:hover { color:#888; }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

  .tab-content { display:none; flex:1; overflow:hidden; }
  .tab-content.active { display:flex; flex-direction:column; }

  .main-grid { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:1px; background:var(--border); flex:1; overflow:hidden; }
  .panel { background:var(--bg); position:relative; display:flex; flex-direction:column; overflow:hidden; }
  .panel-header { background:var(--panel); padding:8px 14px; font-size:12px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; color:var(--accent); border-bottom:1px solid var(--border); flex-shrink:0; }
  .panel-header .unit { color:#666; font-weight:normal; margin-left:6px; }
  .chart-wrap { flex:1; position:relative; padding:8px; min-height:0; }
  canvas { width:100% !important; height:100% !important; }

  .cube-panel { display:flex; align-items:center; justify-content:center; }
  .cube-scene { perspective:800px; width:180px; height:180px; }
  .cube { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.05s linear; }
  .face { position:absolute; width:180px; height:180px; border:2px solid var(--accent); background:rgba(0,212,170,0.06); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--accent); backface-visibility:visible; }
  .face.front  { transform:translateZ(90px); }
  .face.back   { transform:rotateY(180deg) translateZ(90px); }
  .face.right  { transform:rotateY(90deg) translateZ(90px); }
  .face.left   { transform:rotateY(-90deg) translateZ(90px); }
  .face.top    { transform:rotateX(90deg) translateZ(90px); }
  .face.bottom { transform:rotateX(-90deg) translateZ(90px); }

  .data-readout { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:10px 14px; background:var(--panel); border-top:1px solid var(--border); flex-shrink:0; }
  .data-item { text-align:center; }
  .data-item .val { font-size:20px; font-weight:700; color:#fff; font-variant-numeric:tabular-nums; }
  .data-item .lbl { font-size:10px; color:#666; margin-top:2px; }
  .data-item .val.g { color:var(--accent); }
  .data-item .val.r { color:var(--warn); }

  .rate { font-size:10px; color:#555; }

  /* ── Drum Pad ── */
  .drum-pad-page { display:flex; flex:1; align-items:center; justify-content:center; }
  .drum-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; padding:40px; max-width:560px; width:100%; }
  .drum-btn { aspect-ratio:1; border-radius:20px; border:2px solid #2a2a40; cursor:pointer; font-family:inherit; font-size:22px; font-weight:700; letter-spacing:1px; color:#fff; position:relative; transition:all 0.08s ease; outline:none; }
  .drum-btn::after { content:attr(data-key); position:absolute; top:14px; right:18px; font-size:11px; color:rgba(255,255,255,0.3); }
  .drum-btn:active { transform:scale(0.94); }
  .drum-btn.kick  { background:radial-gradient(circle at 30% 30%, #ff6b6b, #8b0000); box-shadow:0 8px 32px rgba(255,107,107,0.25); }
  .drum-btn.kick:active  { background:radial-gradient(circle at 30% 30%, #ff4444, #6b0000); box-shadow:0 4px 16px rgba(255,107,107,0.5); }
  .drum-btn.snare { background:radial-gradient(circle at 30% 30%, #ffdc62, #a67c00); box-shadow:0 8px 32px rgba(255,220,98,0.25); }
  .drum-btn.snare:active { background:radial-gradient(circle at 30% 30%, #ffd000, #7a5c00); box-shadow:0 4px 16px rgba(255,220,98,0.5); }
  .drum-btn.hat   { background:radial-gradient(circle at 30% 30%, #62d5ff, #00608b); box-shadow:0 8px 32px rgba(98,213,255,0.25); }
  .drum-btn.hat:active   { background:radial-gradient(circle at 30% 30%, #3cc8ff, #004a6b); box-shadow:0 4px 16px rgba(98,213,255,0.5); }
  .drum-btn.tom   { background:radial-gradient(circle at 30% 30%, #a78bfa, #4c1d95); box-shadow:0 8px 32px rgba(167,139,250,0.25); }
  .drum-btn.tom:active   { background:radial-gradient(circle at 30% 30%, #8b6cf7, #3b1280); box-shadow:0 4px 16px rgba(167,139,250,0.5); }

  .drum-label { text-align:center; margin-top:16px; color:#666; font-size:12px; }
  .drum-label kbd { display:inline-block; background:#1e1e30; border:1px solid #333; border-radius:4px; padding:2px 8px; font-size:11px; color:#aaa; margin:0 2px; }
</style>
</head>
<body>

<header>
  <h1><span>◈</span> ESP32-S3 IMU Monitor</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <span class="rate" id="rateDisplay">-- Hz</span>
    <span class="status-dot off" id="statusDot"></span>
    <button id="connectBtn" onclick="toggleSerial()">Connect</button>
  </div>
</header>

<!-- ── Tabs ── -->
<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab('imu')" id="tabImu">📊 IMU Monitor</button>
  <button class="tab-btn" onclick="switchTab('drum')" id="tabDrum">🥁 Drum Pad</button>
</nav>

<!-- ── IMU Tab ── -->
<div class="tab-content active" id="imuTab">
  <div class="main-grid">
    <!-- 加速度 -->
    <div class="panel">
      <div class="panel-header">Accelerometer <span class="unit">g</span></div>
      <div class="chart-wrap"><canvas id="accChart"></canvas></div>
      <div class="data-readout">
        <div class="data-item"><div class="val r" id="valAX">--</div><div class="lbl">Acc X (g)</div></div>
        <div class="data-item"><div class="val g" id="valAY">--</div><div class="lbl">Acc Y (g)</div></div>
        <div class="data-item" style="grid-column:1/3"><div class="val" id="valAZ" style="color:#fff;">--</div><div class="lbl">Acc Z (g)</div></div>
      </div>
    </div>

    <!-- 陀螺仪 -->
    <div class="panel">
      <div class="panel-header">Gyroscope <span class="unit">°/s</span></div>
      <div class="chart-wrap"><canvas id="gyrChart"></canvas></div>
      <div class="data-readout">
        <div class="data-item"><div class="val r" id="valGX">--</div><div class="lbl">Gyr X (°/s)</div></div>
        <div class="data-item"><div class="val g" id="valGY">--</div><div class="lbl">Gyr Y (°/s)</div></div>
        <div class="data-item" style="grid-column:1/3"><div class="val" id="valGZ" style="color:#fff;">--</div><div class="lbl">Gyr Z (°/s)</div></div>
      </div>
    </div>

    <!-- 3D 姿态 -->
    <div class="panel cube-panel">
      <div class="cube-scene"><div class="cube" id="cube"><div class="face front">Front</div><div class="face back">Back</div><div class="face right">Right</div><div class="face left">Left</div><div class="face top">Top</div><div class="face bottom">Bottom</div></div></div>
    </div>

    <!-- 终端日志 -->
    <div class="panel" style="overflow:hidden;">
      <div class="panel-header">Raw Data Log</div>
      <pre id="log" style="flex:1;overflow-y:auto;padding:8px 14px;font-size:11px;line-height:1.5;color:#555;white-space:pre-wrap;word-break:break-all;"></pre>
    </div>
  </div>
</div>

<!-- ── Drum Pad Tab ── -->
<div class="tab-content" id="drumTab">
  <div class="drum-pad-page">
    <div class="drum-grid">
      <button class="drum-btn kick"  data-key="Q" onmousedown="playDrum('kick')">  Kick</button>
      <button class="drum-btn snare" data-key="W" onmousedown="playDrum('snare')">Snare</button>
      <button class="drum-btn hat"   data-key="E" onmousedown="playDrum('hat')">   Hat</button>
      <button class="drum-btn tom"   data-key="R" onmousedown="playDrum('tom')">   Tom</button>
    </div>
  </div>
  <div class="drum-label" style="padding:12px;text-align:center;background:var(--panel);border-top:1px solid var(--border);">
    快捷键：<kbd>Q</kbd> Kick &nbsp; <kbd>W</kbd> Snare &nbsp; <kbd>E</kbd> Hat &nbsp; <kbd>R</kbd> Tom
  </div>
</div>

<script>
/* ──────────────── Tab Switching ──────────────── */
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  document.getElementById(name + 'Tab').classList.add('active');
  // Resize charts when switching back to IMU tab
  if (name === 'imu') {
    setTimeout(() => { accChart.resize(); gyrChart.resize(); }, 50);
  }
}

/* ──────────────── Drum → ESP32 via Serial ──────────────── */
// Sends a single character command to the ESP32 to trigger its speaker.
// ESP32 firmware should listen for: 'K'=Kick 'S'=Snare 'H'=Hat 'T'=Tom
const DRUM_CMD = { kick: 'K', snare: 'S', hat: 'H', tom: 'T' };

async function playDrum(type) {
  if (!connected || !writer) {
    log(`Drum: not connected — 请先连接 ESP32`);
    return;
  }
  const cmd = DRUM_CMD[type];
  if (!cmd) return;
  try {
    const enc = new TextEncoder();
    await writer.write(enc.encode(cmd));
  } catch (e) {
    log(`Drum send error: ${e.message}`);
  }
}

// Keyboard shortcuts (only when Drum Pad tab is active)
document.addEventListener('keydown', e => {
  if (!document.getElementById('drumTab').classList.contains('active')) return;
  // Ignore if user is typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const map = { q: 'kick', w: 'snare', e: 'hat', r: 'tom' };
  const type = map[e.key.toLowerCase()];
  if (type) {
    playDrum(type);
    // Flash the button
    const btn = document.querySelector(`.drum-btn.${type}`);
    if (btn) { btn.style.transform = 'scale(0.94)'; setTimeout(() => { btn.style.transform = ''; }, 80); }
  }
});

/* ──────────────── Serial / Charts (unchanged) ──────────────── */
const MAX_POINTS = 200;
const BAUD = 115200;

let port, reader, writer, streamClosed;
let connected = false;
let accData = { x:[], y:[], z:[] };
let gyrData = { x:[], y:[], z:[] };
let labels = [];
let sampleCount = 0, lastRateTime = performance.now(), rateSamples = 0;
let roll = 0, pitch = 0, yaw = 0;

// ── Charts ──
const chartOpts = (max, min) => ({
  responsive:true, maintainAspectRatio:false,
  animation:{duration:0},
  plugins:{legend:{labels:{color:'#666',font:{size:10},usePointStyle:true,pointStyleWidth:6}}},
  scales:{
    x:{display:false},
    y:{min:min||-6,max:max||6,grid:{color:'#1a1a28'},ticks:{color:'#444',font:{size:9}}}
  },
  elements:{point:{radius:0}}
});

const accCtx = document.getElementById('accChart').getContext('2d');
const accChart = new Chart(accCtx, {
  type:'line',
  data:{labels,datasets:[
    {label:'X',data:accData.x,borderColor:'#ff6b6b',borderWidth:1,tension:0},
    {label:'Y',data:accData.y,borderColor:'#00d4aa',borderWidth:1,tension:0},
    {label:'Z',data:accData.z,borderColor:'#ffffff',borderWidth:1.3,tension:0}
  ]},
  options:chartOpts(3,-3)
});

const gyrCtx = document.getElementById('gyrChart').getContext('2d');
const gyrChart = new Chart(gyrCtx, {
  type:'line',
  data:{labels,datasets:[
    {label:'X',data:gyrData.x,borderColor:'#ff6b6b',borderWidth:1,tension:0},
    {label:'Y',data:gyrData.y,borderColor:'#00d4aa',borderWidth:1,tension:0},
    {label:'Z',data:gyrData.z,borderColor:'#ffffff',borderWidth:1.3,tension:0}
  ]},
  options:chartOpts(250,-250)
});

// ── Serial ──
async function toggleSerial() {
  if (connected) { disconnect(); return; }
  try {
    port = await navigator.serial.requestPort({filters:[{usbVendorId:0x303a}]});
    await port.open({baudRate:BAUD});
    connected = true;
    updateUI();
    writer = port.writable.getWriter();
    reader = port.readable.getReader();
    streamClosed = reader.closed;
    streamClosed.catch(() => {});
    readLoop();
  } catch(e) {
    if (e.message !== 'Failed to execute \'requestPort\' on \'Serial\': Must be handling a user gesture to show a permission request.') {
      log(`Error: ${e.message}`);
    }
  }
}

function disconnect() {
  connected = false;
  if (reader) { reader.cancel(); reader = null; }
  if (writer) { writer.close(); writer = null; }
  if (port) { port.close(); port = null; }
  updateUI();
  log('Disconnected');
}

async function readLoop() {
  let buffer = '';
  try {
    while (reader) {
      const {value, done} = await reader.read();
      if (done) break;
      buffer += new TextDecoder().decode(value);
      let idx;
      while ((idx = buffer.indexOf('\n')) !== -1) {
        const line = buffer.slice(0, idx).trim();
        buffer = buffer.slice(idx + 1);
        processLine(line);
      }
    }
  } catch(e) {
    if (e.message !== 'The device was disconnected.') log(`Read error: ${e.message}`);
  }
  disconnect();
}

const CSV_RE = /^(-?\d+\.?\d*),(-?\d+\.?\d*),(-?\d+\.?\d*),(-?\d+\.?\d*),(-?\d+\.?\d*),(-?\d+\.?\d*)$/;

function processLine(line) {
  const m = line.match(CSV_RE);
  if (!m) { log(line); return; }
  const ax = parseFloat(m[1]), ay = parseFloat(m[2]), az = parseFloat(m[3]);
  const gx = parseFloat(m[4]), gy = parseFloat(m[5]), gz = parseFloat(m[6]);

  // Update charts
  sampleCount++;
  labels.push(sampleCount);
  accData.x.push(ax); accData.y.push(ay); accData.z.push(az);
  gyrData.x.push(gx); gyrData.y.push(gy); gyrData.z.push(gz);

  while (labels.length > MAX_POINTS) {
    labels.shift();
    accData.x.shift(); accData.y.shift(); accData.z.shift();
    gyrData.x.shift(); gyrData.y.shift(); gyrData.z.shift();
  }

  // Update readouts
  document.getElementById('valAX').textContent = ax.toFixed(3);
  document.getElementById('valAY').textContent = ay.toFixed(3);
  document.getElementById('valAZ').textContent = az.toFixed(3);
  document.getElementById('valGX').textContent = gx.toFixed(1);
  document.getElementById('valGY').textContent = gy.toFixed(1);
  document.getElementById('valGZ').textContent = gz.toFixed(1);

  // 3D orientation (integrate gyro, complementary filter with accel)
  const dt = 0.02; // 50Hz
  const alpha = 0.98;

  // Gyro integration
  roll  += gx * dt;
  pitch += gy * dt;
  yaw   += gz * dt;

  // Accel correction
  const accRoll  = Math.atan2(ay, az) * 180/Math.PI;
  const accPitch = Math.atan2(-ax, Math.sqrt(ay*ay + az*az)) * 180/Math.PI;

  roll  = alpha * roll  + (1-alpha) * accRoll;
  pitch = alpha * pitch + (1-alpha) * accPitch;

  // Update cube
  const cube = document.getElementById('cube');
  cube.style.transform = `rotateX(${pitch.toFixed(1)}deg) rotateY(${-yaw.toFixed(1)}deg) rotateZ(${-roll.toFixed(1)}deg)`;

  // Rate
  rateSamples++;
  const now = performance.now();
  if (now - lastRateTime > 1000) {
    const hz = Math.round(rateSamples / ((now - lastRateTime) / 1000));
    document.getElementById('rateDisplay').textContent = `${hz} Hz`;
    rateSamples = 0; lastRateTime = now;
  }

  // Chart update throttle: every 5th sample (~10fps)
  if (sampleCount % 5 === 0) {
    accChart.data.labels = labels;
    accChart.update('none');
    gyrChart.data.labels = labels;
    gyrChart.update('none');
  }
}

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

function updateUI() {
  const btn = document.getElementById('connectBtn');
  const dot = document.getElementById('statusDot');
  if (connected) {
    btn.textContent = 'Disconnect';
    btn.classList.add('connected');
    dot.classList.remove('off'); dot.classList.add('on');
  } else {
    btn.textContent = 'Connect';
    btn.classList.remove('connected');
    dot.classList.remove('on'); dot.classList.add('off');
    document.getElementById('rateDisplay').textContent = '-- Hz';
  }
}
</script>
</body>
</html>
